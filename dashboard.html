<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Dashboard | SciVerse Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #7C3AED;
            --primary-light: #8B5CF6;
            --primary-dark: #6D28D9;
            --primary-gradient: linear-gradient(135deg, #7C3AED 0%, #4F46E5 100%);
            --bg: #0B0815;
            --bg-light: #F4F2F9;
            --surface: #15102A;
            --surface-light: #FFFFFF;
            --surface-hover: #1E1836;
            --surface-hover-light: #F0EEF8;
            --text: #FFFFFF;
            --text-light: #1A1528;
            --text-secondary: #A5B4CB;
            --text-secondary-light: #6B7A99;
            --text-muted: #6B7A99;
            --text-muted-light: #94A3B8;
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(0,0,0,0.08);
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-light: 0 4px 20px rgba(0,0,0,0.06);
            --radius: 12px;
            --radius-lg: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #F4F2F9;
            --surface: #FFFFFF;
            --surface-hover: #F0EEF8;
            --text: #1A1528;
            --text-secondary: #4A4658;
            --text-muted: #94A3B8;
            --border: rgba(0,0,0,0.08);
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            transition: background var(--transition), color var(--transition);
        }

        .app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left .logo {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-gradient);
            overflow: hidden;
            flex-shrink: 0;
        }

        .header-left .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-left .brand {
            font-size: 18px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-right .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            flex-shrink: 0;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all var(--transition);
        }

        .theme-toggle:hover {
            border-color: var(--primary);
            color: var(--text);
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
        }

        .main {
            flex: 1;
            padding: 24px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .page-header {
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .page-header p {
            font-size: 15px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            transition: background var(--transition);
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .course-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition);
        }

        .course-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
            background: var(--surface-hover);
        }

        .course-card .icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius);
            background: rgba(124,58,237,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            color: var(--primary-light);
        }

        .course-card .icon svg {
            width: 22px;
            height: 22px;
        }

        .course-card h3 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .course-card p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-card .meta {
            margin-top: 14px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .course-card .meta span {
            background: rgba(124,58,237,0.1);
            color: var(--primary-light);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }

        .empty-state .icon {
            opacity: 0.4;
            margin-bottom: 16px;
        }

        .empty-state .icon svg {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 40px auto;
            grid-column: 1 / -1;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .page-header h1 {
                font-size: 22px;
            }
            .course-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header-left .brand {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <img src="/images/protected.png" alt="SciVerse" />
                </div>
                <span class="brand">SciVerse</span>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <div class="avatar" id="avatar">S</div>
            </div>
        </header>

        <main class="main">
            <div class="page-header">
                <h1>My Courses</h1>
                <p>Continue learning where you left off.</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="number" id="statCourses">0</div>
                    <div class="label">Enrolled Courses</div>
                </div>
            </div>

            <div class="course-grid" id="courseGrid">
                <div class="spinner" id="spinner"></div>
            </div>
        </main>
    </div>

    <script src="/network-check.js"></script>
    <script src="/api-fix.js"></script>
    <script>
        const API = 'https://sciverseacademy.pages.dev/api';

        const token = localStorage.getItem('site_token');
        const user = JSON.parse(localStorage.getItem('site_user') || 'null');

        if (!token || !user) {
            window.location.href = '/index.html';
        }

        if (user.role === 'admin') {
            window.location.href = '/admin.html';
        }

        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('sciverse-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        themeToggle.addEventListener('click', function() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('sciverse-theme', next);
        });

        const initial = (user.name || 'S')[0].toUpperCase();
        document.getElementById('avatar').textContent = initial;

        async function loadCourses() {
            const grid = document.getElementById('courseGrid');
            const spinner = document.getElementById('spinner');

            if (!navigator.onLine) {
                spinner.style.display = 'none';
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M22 2L2 22" />
                                <path d="M8.5 6.5C10.5 5 13 4.5 16 5.5" />
                                <path d="M12 12C13.5 12.5 15 13 16 14" />
                                <path d="M3 3C5 5 7 7 9 9" />
                                <path d="M14 14C16 16 18 18 21 21" />
                                <circle cx="12" cy="16" r="1.5" />
                            </svg>
                        </div>
                        <h3>No Internet Connection</h3>
                        <p>Please check your network settings and try again.</p>
                    </div>
                `;
                return;
            }

            try {
                const res = await fetch(API + '/user/courses', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();

                spinner.style.display = 'none';

                if (!res.ok || !data.courses || !data.courses.length) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="2" y="3" width="20" height="14" rx="2" />
                                    <line x1="8" y1="21" x2="16" y2="21" />
                                    <line x1="12" y1="17" x2="12" y2="21" />
                                </svg>
                            </div>
                            <h3>No Courses Enrolled</h3>
                            <p>Your enrolled courses will appear here once an admin assigns them to your account.</p>
                        </div>
                    `;
                    document.getElementById('statCourses').textContent = '0';
                    return;
                }

                document.getElementById('statCourses').textContent = data.courses.length;

                grid.innerHTML = '';
                data.courses.forEach(function(course) {
                    const card = document.createElement('a');
                    card.href = '/course.html?id=' + course.id;
                    card.className = 'course-card';

                    const desc = course.description || 'No description available.';
                    const date = course.created_at ? new Date(course.created_at).toLocaleDateString() : '';

                    card.innerHTML = `
                        <div class="icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
                            </svg>
                        </div>
                        <h3>${escapeHtml(course.title)}</h3>
                        <p>${escapeHtml(desc)}</p>
                        <div class="meta">
                            <span>Enrolled</span>
                            ${date}
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                spinner.style.display = 'none';
                if (!navigator.onLine) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M22 2L2 22" />
                                    <path d="M8.5 6.5C10.5 5 13 4.5 16 5.5" />
                                    <path d="M12 12C13.5 12.5 15 13 16 14" />
                                    <path d="M3 3C5 5 7 7 9 9" />
                                    <path d="M14 14C16 16 18 18 21 21" />
                                    <circle cx="12" cy="16" r="1.5" />
                                </svg>
                            </div>
                            <h3>No Internet Connection</h3>
                            <p>Please check your network settings and try again.</p>
                        </div>
                    `;
                } else {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <circle cx="12" cy="12" r="10" />
                                    <line x1="12" y1="8" x2="12" y2="12" />
                                    <line x1="12" y1="16" x2="12.01" y2="16" />
                                </svg>
                            </div>
                            <h3>Connection Error</h3>
                            <p>Please check your network and try again.</p>
                        </div>
                    `;
                }
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadCourses();
    </script>
</body>
</html>
