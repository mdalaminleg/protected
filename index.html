<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Sign In | SciVerse Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #7C3AED;
            --primary-light: #8B5CF6;
            --primary-dark: #6D28D9;
            --primary-gradient: linear-gradient(135deg, #7C3AED 0%, #4F46E5 100%);
            --bg: #0B0815;
            --bg-light: #F4F2F9;
            --surface: #15102A;
            --surface-light: #FFFFFF;
            --text: #FFFFFF;
            --text-light: #1A1528;
            --text-secondary: #A5B4CB;
            --text-secondary-light: #6B7A99;
            --text-muted: #6B7A99;
            --text-muted-light: #94A3B8;
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(0,0,0,0.08);
            --shadow: 0 25px 60px rgba(0,0,0,0.6);
            --shadow-light: 0 25px 60px rgba(0,0,0,0.08);
            --radius: 12px;
            --radius-lg: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #F4F2F9;
            --surface: #FFFFFF;
            --text: #1A1528;
            --text-secondary: #4A4658;
            --text-muted: #94A3B8;
            --border: rgba(0,0,0,0.08);
            --shadow: 0 25px 60px rgba(0,0,0,0.08);
        }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            transition: background var(--transition), color var(--transition);
        }

        .container {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.06) 0%, transparent 70%);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .card-header .logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(124,58,237,0.3);
        }

        .card-header .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-header h1 {
            font-size: 24px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .card-header p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all var(--transition);
        }

        [data-theme="light"] .form-input {
            background: rgba(0,0,0,0.02);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            border-color: var(--primary);
            background: rgba(124,58,237,0.05);
            box-shadow: 0 0 0 4px rgba(124,58,237,0.1);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px 24px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--transition);
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: #fff;
            box-shadow: 0 4px 16px rgba(124,58,237,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(124,58,237,0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 18px;
            display: none;
        }

        .alert-error {
            display: block;
            background: rgba(239,68,68,0.1);
            color: #EF4444;
            border: 1px solid rgba(239,68,68,0.2);
        }

        .alert-success {
            display: block;
            background: rgba(16,185,129,0.1);
            color: #10B981;
            border: 1px solid rgba(16,185,129,0.2);
        }

        .footer-links {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .footer-links a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
            transition: color var(--transition);
        }

        .footer-links a:hover {
            color: var(--text);
        }

        .footer-text {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all var(--transition);
            z-index: 1000;
        }

        .theme-toggle:hover {
            border-color: var(--primary);
            color: var(--text);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 24px;
            }
            .card-header .logo {
                width: 60px;
                height: 60px;
            }
            .card-header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="logo">
                    <img src="/images/protected.png" alt="SciVerse Academy" />
                </div>
                <h1>SciVerse Academy</h1>
                <p>Learn. Grow. Succeed.</p>
            </div>

            <div class="alert" id="alert"></div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com" required autofocus />
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Enter your password" required />
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span id="btnText">Sign In</span>
                    <span class="spinner" id="spinner"></span>
                </button>
            </form>

            <div class="footer-links">
                Don't have an account? <a href="/register.html">Create Account</a>
            </div>

            <div class="footer-text">
                &copy; 2026 SciVerse Academy. All rights reserved.
            </div>
        </div>
    </div>

    <script src="/network-check.js"></script>
    <script src="/api-fix.js"></script>
    <script>
        const API = 'https://sciverseacademy.pages.dev/api';

        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('sciverse-theme') || 'dark';

        document.documentElement.setAttribute('data-theme', savedTheme);

        themeToggle.addEventListener('click', function() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('sciverse-theme', next);
        });

        function showAlert(msg, type) {
            const el = document.getElementById('alert');
            el.textContent = msg;
            el.className = 'alert alert-' + type;
        }

        function hideAlert() {
            const el = document.getElementById('alert');
            el.className = 'alert';
            el.textContent = '';
        }

        function setLoading(loading) {
            document.getElementById('submitBtn').disabled = loading;
            document.getElementById('spinner').style.display = loading ? 'inline-block' : 'none';
            document.getElementById('btnText').style.display = loading ? 'none' : 'inline';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideAlert();

            if (!navigator.onLine) {
                showAlert('No internet connection. Please check your network.', 'error');
                return;
            }

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert('Please fill in all fields.', 'error');
                return;
            }

            setLoading(true);

            try {
                const res = await fetch(API + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showAlert(data.error || 'Login failed.', 'error');
                    setLoading(false);
                    return;
                }

                localStorage.setItem('site_token', data.token);
                localStorage.setItem('site_user', JSON.stringify(data.user));

                setTimeout(() => {
                    window.location.href = data.user.role === 'admin' ? '/admin.html' : '/dashboard.html';
                }, 400);

            } catch (err) {
                if (!navigator.onLine) {
                    showAlert('No internet connection. Please check your network.', 'error');
                } else {
                    showAlert('Network error. Please try again.', 'error');
                }
                setLoading(false);
            }
        });

        const token = localStorage.getItem('site_token');
        const user = JSON.parse(localStorage.getItem('site_user') || 'null');
        if (token && user && navigator.onLine) {
            window.location.href = user.role === 'admin' ? '/admin.html' : '/dashboard.html';
        }
    </script>
</body>
</html>
