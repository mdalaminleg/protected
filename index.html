<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sign In | SciVerse Academy</title>
    <meta name="description" content="Sign in to SciVerse Academy.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0B1F3A; --navy-2: #112D52; --navy-3: #1A3F6F;
            --gold: #B8751A; --gold-2: #CF8B28; --gold-dim: rgba(184,117,26,0.10);
            --white: #F0F4F8; --gray: #94A3B5; --gray2: #7A8899;
            --red: #F0566A; --red-dim: rgba(240,86,106,0.10);
            --green: #10D48E; --green-dim: rgba(16,212,142,0.10);
            --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.11);
            --radius: 9px; --radius-lg: 13px;
            --transition: .18s cubic-bezier(.4,0,.2,1);
            --bg: #05080F; --surface: #0B0F1A; --surface2: #111827; --surface3: #161E2E;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { font-size:16px; }
        body {
            font-family:'Plus Jakarta Sans', system-ui, sans-serif;
            background: var(--bg); color: var(--white);
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        .hdr {
            height: 64px; background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px;
            flex-shrink: 0; position: sticky; top: 0; z-index: 100;
        }
        .hdr-inner {
            display: flex; align-items: center; gap: 12px;
            width: 100%; max-width: 1200px; margin: 0 auto;
        }
        .logo { height: 32px; }
        .hdr-title {
            font-family: 'Fraunces', serif; font-size: 1.1rem;
            font-weight: 600; color: var(--white); letter-spacing: -.01em;
        }
        .main {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 36px 30px;
            width: 100%; max-width: 420px;
        }
        .card-title {
            font-family: 'Fraunces', serif; font-size: 1.5rem;
            font-weight: 600; color: var(--white); margin-bottom: 6px;
        }
        .card-subtitle {
            font-size: .85rem; color: var(--gray); margin-bottom: 28px;
        }
        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block; font-size: .75rem; font-weight: 600;
            color: var(--gray2); margin-bottom: 6px; letter-spacing: .02em;
            text-transform: uppercase;
        }
        .form-input {
            width: 100%; padding: 11px 14px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius); color: var(--white);
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: .9rem;
            outline: none; transition: var(--transition);
        }
        .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
        .form-input::placeholder { color: var(--gray2); opacity: .5; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600; font-size: .88rem;
            border: 1.5px solid transparent; border-radius: var(--radius);
            cursor: pointer; text-decoration: none;
            white-space: nowrap; transition: var(--transition);
            letter-spacing: .01em; width: 100%; padding: 12px;
        }
        .btn-primary {
            background: var(--gold); color: #fff; border-color: var(--gold);
        }
        .btn-primary:hover { background: var(--gold-2); border-color: var(--gold-2); }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
        .link-text {
            text-align: center; margin-top: 20px;
            font-size: .82rem; color: var(--gray);
        }
        .link-text a { color: var(--gold); text-decoration: none; font-weight: 600; }
        .link-text a:hover { text-decoration: underline; }
        .alert {
            padding: 10px 14px; border-radius: var(--radius);
            font-size: .8rem; font-weight: 500; margin-bottom: 18px;
            display: none;
        }
        .alert-error { display: block; background: var(--red-dim); color: var(--red); border: 1px solid rgba(240,86,106,0.25); }
        .alert-success { display: block; background: var(--green-dim); color: var(--green); border: 1px solid rgba(16,212,142,0.25); }
        .spinner {
            width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.2);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .6s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .ftr {
            background: var(--surface); border-top: 1px solid var(--border);
            padding: 16px 20px; text-align: center; flex-shrink: 0;
        }
        .ftr p { font-size: .68rem; color: rgba(255,255,255,.14); }
        .toast {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            padding: 12px 18px; border-radius: var(--radius);
            font-size: .8rem; font-weight: 500;
            background: var(--surface3); color: var(--white);
            border: 1px solid var(--border2);
            box-shadow: 0 20px 48px rgba(0,0,0,.5);
            opacity: 0; transform: translateY(8px);
            transition: all .2s; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast-error { border-color: rgba(240,86,106,0.4); }
        .toast-success { border-color: rgba(16,212,142,0.4); }
        @media (max-width:600px) {
            .card { padding: 28px 20px; }
            .card-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<header class="hdr">
    <div class="hdr-inner">
        <img src="/images/protected.png" height="32" alt="SciVerse Academy" class="logo">
        <span class="hdr-title">SciVerse Academy</span>
    </div>
</header>

<main class="main">
    <div class="card">
        <h1 class="card-title">Welcome Back</h1>
        <p class="card-subtitle">Sign in to access your courses.</p>

        <div class="alert" id="alert"></div>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" class="form-input" id="email" placeholder="your@email.com" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-input" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">
                <span id="btnText">Sign In</span>
                <span class="spinner" id="spinner"></span>
            </button>
        </form>

        <p class="link-text">Don't have an account? <a href="/register.html">Create Account</a></p>
    </div>
</main>

<footer class="ftr"><p>Protected Content &copy; 2026 SciVerse Academy. All rights reserved.</p></footer>
<div class="toast" id="toast"></div>

<script>
function esc(s) { const d = document.createElement('div'); d.textContent = String(s || ''); return d.innerHTML; }
function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast toast-' + (type || 'success') + ' show';
    setTimeout(function(){ t.classList.remove('show'); }, 3500);
}
function showAlert(msg, type) {
    const a = document.getElementById('alert');
    a.textContent = msg;
    a.className = 'alert alert-' + (type || 'error');
}
function hideAlert() {
    const a = document.getElementById('alert');
    a.className = 'alert';
    a.textContent = '';
}
function setLoading(loading) {
    document.getElementById('submitBtn').disabled = loading;
    document.getElementById('spinner').style.display = loading ? 'inline-block' : 'none';
    document.getElementById('btnText').style.display = loading ? 'none' : 'inline';
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    hideAlert();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showAlert('Please fill in all fields.', 'error'); return; }
    setLoading(true);
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { showAlert(data.error || 'Login failed.', 'error'); setLoading(false); return; }
        localStorage.setItem('site_token', data.token);
        localStorage.setItem('site_user', JSON.stringify(data.user));
        showToast('Signed in successfully.');
        setTimeout(function() {
            if (data.user.role === 'admin') window.location.href = '/admin.html';
            else window.location.href = '/dashboard.html';
        }, 600);
    } catch (err) {
        showAlert('Network error. Please try again.', 'error');
        setLoading(false);
    }
});
</script>
</body>
</html>
