<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Course | SciVerse Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #7C3AED;
            --primary-light: #8B5CF6;
            --primary-dark: #6D28D9;
            --primary-gradient: linear-gradient(135deg, #7C3AED 0%, #4F46E5 100%);
            --bg: #0B0815;
            --bg-light: #F4F2F9;
            --surface: #15102A;
            --surface-light: #FFFFFF;
            --surface-hover: #1E1836;
            --surface-hover-light: #F0EEF8;
            --text: #FFFFFF;
            --text-light: #1A1528;
            --text-secondary: #A5B4CB;
            --text-secondary-light: #6B7A99;
            --text-muted: #6B7A99;
            --text-muted-light: #94A3B8;
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(0,0,0,0.08);
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-light: 0 4px 20px rgba(0,0,0,0.06);
            --radius: 12px;
            --radius-lg: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #F4F2F9;
            --surface: #FFFFFF;
            --surface-hover: #F0EEF8;
            --text: #1A1528;
            --text-secondary: #4A4658;
            --text-muted: #94A3B8;
            --border: rgba(0,0,0,0.08);
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            transition: background var(--transition), color var(--transition);
        }

        .app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left .logo {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-gradient);
            overflow: hidden;
            flex-shrink: 0;
        }

        .header-left .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-left .back {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            transition: color var(--transition);
        }

        .header-left .back:hover {
            color: var(--text);
        }

        .header-left .back svg {
            width: 22px;
            height: 22px;
        }

        .header-left .brand {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-right .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            flex-shrink: 0;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all var(--transition);
        }

        .theme-toggle:hover {
            border-color: var(--primary);
            color: var(--text);
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
        }

        .main {
            flex: 1;
            padding: 24px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .course-header {
            margin-bottom: 28px;
        }

        .course-header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .course-header .desc {
            font-size: 15px;
            color: var(--text-secondary);
            margin-top: 6px;
            line-height: 1.6;
        }

        .course-header .desc strong {
            color: var(--primary-light);
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all var(--transition);
        }

        .tab-btn:hover {
            color: var(--text);
        }

        .tab-btn.active {
            color: var(--primary-light);
            border-bottom-color: var(--primary);
        }

        .tab-panel {
            display: none;
            padding-bottom: 40px;
        }

        .tab-panel.active {
            display: block;
        }

        .subject-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .subject-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all var(--transition);
        }

        .subject-card:hover {
            border-color: var(--border);
        }

        .subject-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background var(--transition);
        }

        .subject-header:hover {
            background: var(--surface-hover);
        }

        .subject-header .title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .subject-header .desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
            line-height: 1.4;
        }

        .subject-header .desc strong {
            color: var(--primary-light);
        }

        .subject-arrow {
            width: 20px;
            height: 20px;
            color: var(--text-muted);
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .subject-card.expanded .subject-arrow {
            transform: rotate(180deg);
        }

        .lecture-list {
            display: none;
            border-top: 1px solid var(--border);
        }

        .subject-card.expanded .lecture-list {
            display: block;
        }

        .lecture-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px 12px 36px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: all var(--transition);
            border-bottom: 1px solid var(--border);
        }

        .lecture-item:last-child {
            border-bottom: none;
        }

        .lecture-item:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .lecture-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: var(--primary-light);
        }

        .lecture-item .empty {
            color: var(--text-muted);
            font-weight: 400;
        }

        .resource-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .resource-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            transition: all var(--transition);
        }

        .resource-card:hover {
            border-color: var(--primary);
            background: var(--surface-hover);
        }

        .resource-card .title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .resource-card .desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .resource-card .desc strong {
            color: var(--primary-light);
        }

        .resource-card .link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary-light);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: color var(--transition);
        }

        .resource-card .link:hover {
            color: var(--text);
        }

        .resource-card .link svg {
            width: 14px;
            height: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
            opacity: 0.4;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .course-header h1 {
                font-size: 22px;
            }
            .tab-btn {
                padding: 10px 16px;
                font-size: 13px;
            }
            .subject-header .title {
                font-size: 14px;
            }
            .lecture-item {
                padding: 10px 16px 10px 28px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <a href="/dashboard.html" class="back">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </a>
                <div class="logo">
                    <img src="/images/protected.png" alt="SciVerse" />
                </div>
                <span class="brand" id="headerTitle">Loading...</span>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
                <div class="avatar" id="avatar">S</div>
            </div>
        </header>

        <main class="main">
            <div class="course-header">
                <h1 id="courseTitle">Loading...</h1>
                <div class="desc" id="courseDesc"></div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="subjects">Subjects</button>
                <button class="tab-btn" data-tab="resources">Resources</button>
            </div>

            <div class="tab-panel active" id="panel-subjects">
                <div class="subject-list" id="subjectList">
                    <div class="spinner" id="subjectsSpinner"></div>
                </div>
                <div class="empty-state" id="emptySubjects" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <line x1="9" y1="9" x2="15" y2="9" />
                        <line x1="9" y1="13" x2="15" y2="13" />
                    </svg>
                    <h3>No Subjects</h3>
                    <p>Subjects for this course will appear here.</p>
                </div>
            </div>

            <div class="tab-panel" id="panel-resources">
                <div class="resource-list" id="resourceList"></div>
                <div class="empty-state" id="emptyResources" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
                        <polyline points="13 2 13 9 20 9" />
                    </svg>
                    <h3>No Resources</h3>
                    <p>Additional resources for this course will appear here.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="/network-check.js"></script>
    <script src="/api-fix.js"></script>
    <script>
        const API = 'https://sciverseacademy.pages.dev/api';

        const token = localStorage.getItem('site_token');
        const user = JSON.parse(localStorage.getItem('site_user') || 'null');

        if (!token || !user) {
            window.location.href = '/index.html';
        }

        const params = new URLSearchParams(location.search);
        const courseId = params.get('id');

        if (!courseId) {
            window.location.href = '/dashboard.html';
        }

        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('sciverse-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        themeToggle.addEventListener('click', function() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('sciverse-theme', next);
        });

        const initial = (user.name || 'S')[0].toUpperCase();
        document.getElementById('avatar').textContent = initial;

        // Tabs
        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(function(b) {
                    b.classList.remove('active');
                });
                document.querySelectorAll('.tab-panel').forEach(function(p) {
                    p.classList.remove('active');
                });
                btn.classList.add('active');
                document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
            });
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadCourse() {
            if (!navigator.onLine) {
                document.getElementById('subjectsSpinner').style.display = 'none';
                document.getElementById('emptySubjects').style.display = 'block';
                document.querySelector('#emptySubjects h3').textContent = 'No Internet Connection';
                document.querySelector('#emptySubjects p').textContent = 'Please check your network settings.';
                return;
            }

            try {
                const res = await fetch(API + '/user/course?id=' + courseId, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();

                document.getElementById('subjectsSpinner').style.display = 'none';

                if (!res.ok) {
                    document.getElementById('emptySubjects').style.display = 'block';
                    document.querySelector('#emptySubjects h3').textContent = 'Error Loading';
                    document.querySelector('#emptySubjects p').textContent = data.error || 'Failed to load course.';
                    return;
                }

                document.getElementById('courseTitle').textContent = data.course.title;
                document.getElementById('headerTitle').textContent = data.course.title;
                document.getElementById('courseDesc').innerHTML = data.course.description || '';
                document.title = data.course.title + ' | SciVerse Academy';

                // Subjects
                const subjectList = document.getElementById('subjectList');

                if (!data.subjects || !data.subjects.length) {
                    document.getElementById('emptySubjects').style.display = 'block';
                    document.querySelector('#emptySubjects h3').textContent = 'No Subjects Yet';
                    document.querySelector('#emptySubjects p').textContent = 'Subjects for this course will appear here.';
                } else {
                    subjectList.innerHTML = '';
                    data.subjects.forEach(function(sub) {
                        const card = document.createElement('div');
                        card.className = 'subject-card';

                        let descHtml = '';
                        if (sub.description) {
                            descHtml = '<div class="desc">' + sub.description + '</div>';
                        }

                        let lecturesHtml = '';
                        if (sub.lectures && sub.lectures.length) {
                            lecturesHtml = sub.lectures.map(function(lec) {
                                return '<a href="/lecture.html?lecture_id=' + lec.id + '&course_id=' + courseId + '" class="lecture-item">' +
                                    '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3" /></svg>' +
                                    escapeHtml(lec.title) +
                                '</a>';
                            }).join('');
                        } else {
                            lecturesHtml = '<div class="lecture-item"><span class="empty">No lectures available</span></div>';
                        }

                        card.innerHTML = 
                            '<div class="subject-header" onclick="this.parentElement.classList.toggle(\'expanded\')">' +
                                '<div>' +
                                    '<div class="title">' + escapeHtml(sub.title) + '</div>' +
                                    descHtml +
                                '</div>' +
                                '<svg class="subject-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
                                    '<polyline points="6 9 12 15 18 9" />' +
                                '</svg>' +
                            '</div>' +
                            '<div class="lecture-list">' + lecturesHtml + '</div>';

                        subjectList.appendChild(card);
                    });
                }

                // Resources
                const resourceList = document.getElementById('resourceList');

                if (!data.resources || !data.resources.length) {
                    document.getElementById('emptyResources').style.display = 'block';
                    document.querySelector('#emptyResources h3').textContent = 'No Resources';
                    document.querySelector('#emptyResources p').textContent = 'Additional resources for this course will appear here.';
                } else {
                    resourceList.innerHTML = '';
                    data.resources.forEach(function(res) {
                        const card = document.createElement('div');
                        card.className = 'resource-card';

                        let descHtml = '';
                        if (res.description) {
                            descHtml = '<div class="desc">' + res.description + '</div>';
                        }

                        card.innerHTML =
                            '<div class="title">' + escapeHtml(res.title) + '</div>' +
                            descHtml +
                            '<a href="' + escapeHtml(res.link_url) + '" target="_blank" rel="noopener" class="link">' +
                                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
                                    '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />' +
                                    '<polyline points="15 3 21 3 21 9" />' +
                                    '<line x1="10" y1="14" x2="21" y2="3" />' +
                                '</svg>' +
                                'Open Resource' +
                            '</a>';

                        resourceList.appendChild(card);
                    });
                }

            } catch (err) {
                document.getElementById('subjectsSpinner').style.display = 'none';
                document.getElementById('emptySubjects').style.display = 'block';
                if (!navigator.onLine) {
                    document.querySelector('#emptySubjects h3').textContent = 'No Internet Connection';
                    document.querySelector('#emptySubjects p').textContent = 'Please check your network settings.';
                } else {
                    document.querySelector('#emptySubjects h3').textContent = 'Connection Error';
                    document.querySelector('#emptySubjects p').textContent = 'Please try again.';
                }
            }
        }

        loadCourse();
    </script>
</body>
</html>
